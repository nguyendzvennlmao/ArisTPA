# ==========================================
# CÀI ĐẶT DỊCH CHUYỂN & YÊU CẦU
# ==========================================
teleport:
  countdown: 5
  allowed-walk-range: 0.1
  safe-teleport: false

request:
  expiration-time: 120
  cooldown: 30
  daily-limit: -1

# ==========================================
# ÂM THANH (SOUNDS)
# ==========================================
sounds:
  gui-click: "UI_BUTTON_CLICK"
  countdown-tick: "BLOCK_NOTE_BLOCK_CHIME"
  teleport-success: "ENTITY_PLAYER_LEVELUP"
  cancel-sound: "ENTITY_VILLAGER_NO"

# ==========================================
# THẾ GIỚI CẤM (BLACKLISTED WORLDS)
# ==========================================
blacklisted-worlds:
  enabled: true
  worlds:
    - "world_nether"
    - "world_the_end"
    - "pvp_world"

# ==========================================
# CẤU HÌNH GUI (GIAO DIỆN)
# ==========================================
gui:
  enabled: true
  command-enabled: false
  world-materials:
    world: GRASS_BLOCK
    world_nether: NETHERRACK
    world_the_end: END_STONE

request-gui:
  name: "&8ᴄᴏɴғɪʀᴍ ʀᴇǫᴜᴇsᴛ"
  rows: 3
  icons:
    cancel-icon:
      slot: 10
      material: RED_STAINED_GLASS_PANE
      display-name: "&4ᴄᴀɴᴄᴇʟ"
      lore:
        - "&7Click to cancel this request"
    location-icon:
      slot: 12
      display-name: "&aʟᴏᴄᴀᴛɪᴏɴ"
      lore:
        - "&f%world%"
    player-icon:
      slot: 13
      material: PLAYER_HEAD
      display-name: "&aᴘʟᴀʏᴇʀ"
      lore:
        - "&f%player%"
    fly-icon:
      slot: 14
      material: FEATHER
      display-name: "&aғʟʏɪɴɢ"
      lore:
        - "&f%is_flying%"
    confirm-icon:
      slot: 16
      material: LIME_STAINED_GLASS_PANE
      display-name: "&aᴄᴏɴғɪʀᴍ"
      lore:
        - "&7Click to send a teleport request"
        - "&7to &f%player%"

accept-gui:
  name: "&8ᴀᴄᴄᴇᴘᴛ ʀᴇǫᴜᴇsᴛ"
  rows: 3
  icons:
    cancel-icon:
      slot: 10
      material: RED_STAINED_GLASS_PANE
      display-name: "&4ᴅᴇɴʏ"
      lore:
        - "&7Click to deny this request"
    location-icon:
      slot: 12
      display-name: "&aʟᴏᴄᴀᴛɪᴏɴ"
      lore:
        - "&f%world%"
    player-icon:
      slot: 13
      material: PLAYER_HEAD
      display-name: "&aᴘʟᴀʏᴇʀ"
      lore:
        - "&f%player%"
    fly-icon:
      slot: 14
      material: FEATHER
      display-name: "&aғʟʏɪɴɢ"
      lore:
        - "&f%is_flying%"
    confirm-icon:
      slot: 16
      material: LIME_STAINED_GLASS_PANE
      display-name: "&aᴀᴄᴄᴇᴘᴛ"
      lore:
        - "&7Click to accept teleport request"
        - "&7from &f%player%"

